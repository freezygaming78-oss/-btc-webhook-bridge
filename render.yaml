services:
  - type: web
    name: btc-webhook-bridge
    runtime: python
    region: oregon
    plan: starter          # $7/mo — always-on (no cold start); use 'free' to test
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook_server:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: BLOFIN_API_KEY
        sync: false         # Render prompts you to fill this in the dashboard
      - key: BLOFIN_SECRET
        sync: false
      - key: BLOFIN_PASSPHRASE
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: MAX_TOTAL_RISK_PCT
        value: "1.0"
      - key: DEFAULT_LEVERAGE
        value: "7"
      - key: ENV
        value: production
